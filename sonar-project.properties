sonar.projectKey=Tes1-app
sonar.projectName=Antigravity To-Do List Application
sonar.projectVersion=1.0

# Server URL (defaulting to local)
sonar.host.url=http://localhost:9000

# Path to the source directories.
sonar.sources=src

# The encoding of the source code.
sonar.sourceEncoding=UTF-8

# Directories/files to exclude from analysis
sonar.exclusions=node_modules/**, dist/**, public/**, .gemini/**

# Language
sonar.language=js
